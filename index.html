<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 Persephone · Dual Realm</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap');
:root {
  --void: #080a0f; --deep: #0b0e16; --surface: #1a1c28;
  --gold: #c8943a; --pomegranate: #8b3a45; --mist: #6a7a8a; --pale: #d4d0e0;
  --greek: #b0c4de; --font-display: 'Cinzel', serif;
  --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--void); color:var(--pale); font-family:var(--font-body); height:100vh; overflow:hidden; }

.topbar {
  display:flex; align-items:center; gap:1rem; padding:0.4rem 1rem;
  background:var(--deep); border-bottom:1px solid var(--surface);
}
.topbar h1 { font-family:var(--font-display); font-size:0.85rem; color:var(--pomegranate); letter-spacing:2px; }
.topbar .status { font-family:var(--font-mono); font-size:0.5rem; color:var(--mist); margin-left:auto; }
.topbar .dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:4px; }
.dot-saved { background:#4ade80; } .dot-saving { background:#f0c060; animation:pulse 0.6s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.workspace { display:flex; height:calc(100vh - 42px); }

/* LEFT: SOURCE (fast save) */
.pane {
  width:50%; display:flex; flex-direction:column;
}
.pane-left { border-right:1px solid var(--surface); }
.pane-header {
  padding:0.3rem 0.8rem; background:var(--deep);
  border-bottom:1px solid var(--surface);
  font-family:var(--font-mono); font-size:0.5rem; color:var(--mist);
  display:flex; align-items:center; gap:0.5rem; letter-spacing:1px;
}
.pane-header .badge {
  font-size:0.4rem; padding:0.1rem 0.4rem; border-radius:2px;
  background:rgba(74,222,128,0.1); color:#4ade80;
}
.pane-header .badge.fast { background:rgba(74,222,128,0.1); color:#4ade80; }
.pane-header .badge.slow { background:rgba(139,58,69,0.15); color:var(--pomegranate); }

textarea {
  flex:1; background:transparent; border:none; padding:1.2rem;
  font-family:var(--font-body); font-size:0.9rem; line-height:1.8;
  color:var(--pale); resize:none; outline:none;
}
textarea::placeholder { color:#2a2a35; font-style:italic; }
.pane-left textarea { color:var(--greek); font-family:var(--font-body); }

/* TOOLBAR */
.toolbar {
  padding:0.3rem 0.8rem; background:var(--deep);
  border-top:1px solid var(--surface); display:flex; gap:0.4rem;
}
button {
  padding:0.25rem 0.5rem; background:var(--surface); color:var(--pale);
  border:1px solid var(--surface); border-radius:3px; cursor:pointer;
  font-family:var(--font-mono); font-size:0.45rem; letter-spacing:0.5px;
}
button:hover { border-color:var(--pomegranate); color:var(--pale); }
button.primary { background:var(--pomegranate); border-color:var(--pomegranate); color:#fff; }
button.primary:hover { background:#a04a55; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🦉 PERSEPHONE · Dual Realm</h1>
  <span class="status">
    <span id="leftDot" class="dot dot-saved"></span>Source · 
    <span id="rightDot" class="dot dot-saved"></span>Writing
  </span>
  <span style="font-family:var(--font-mono);font-size:0.45rem;color:var(--mist);" id="wordCount">0 words</span>
</div>

<div class="workspace">
  
  <!-- LEFT: SOURCE TEXT (5s auto-save) -->
  <div class="pane pane-left">
    <div class="pane-header">
      <span>📜 SOURCE</span>
      <span class="badge fast">5s save</span>
    </div>
    <textarea id="sourceText" placeholder="Paste Greek, notes, research, anything..."></textarea>
    <div class="toolbar">
      <button onclick="clearPane('source')">✕ Clear</button>
      <button onclick="copyPane('source')">📋 Copy</button>
    </div>
  </div>

  <!-- RIGHT: WRITING (30s auto-save) -->
  <div class="pane">
    <div class="pane-header">
      <span>✏️ WRITING</span>
      <span class="badge slow">30s save</span>
    </div>
    <textarea id="writingText" placeholder="Your translation, prose, notes..."></textarea>
    <div class="toolbar">
      <button class="primary" onclick="saveNow()">💾 Save Now</button>
      <button onclick="clearPane('writing')">✕ Clear</button>
      <button onclick="copyPane('writing')">📋 Copy</button>
    </div>
  </div>

</div>

<script type="module">
const sb = window.supabase.createClient(
  'https://kzcucjcyxybypncbdbws.supabase.co',
  'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);

const DOC_ID = 'persephone-current'; // single document for now
let sourceTimer = null;
let writingTimer = null;
let sourceDirty = false;
let writingDirty = false;

// ═══════════ LOAD ═══════════
async function loadDocument() {
  const { data } = await sb.from('documents')
    .select('*')
    .eq('id', DOC_ID)
    .maybeSingle();
  
  if (data) {
    document.getElementById('sourceText').value = data.source_text || '';
    document.getElementById('writingText').value = data.writing_text || '';
    updateWordCount();
  }
}

// ═══════════ SAVE ═══════════
async function saveDocument(sourceText, writingText) {
  const { error } = await sb.from('documents').upsert({
    id: DOC_ID,
    source_text: sourceText,
    writing_text: writingText,
    updated_at: new Date().toISOString()
  }, { onConflict: 'id' });
  
  return !error;
}

function setDot(pane, state) {
  const dot = document.getElementById(pane === 'source' ? 'leftDot' : 'rightDot');
  dot.className = `dot dot-${state}`;
}

// ═══════════ AUTO-SAVE: SOURCE (5s) ═══════════
document.getElementById('sourceText').addEventListener('input', function() {
  sourceDirty = true;
  setDot('source', 'saving');
  clearTimeout(sourceTimer);
  sourceTimer = setTimeout(async () => {
    const sourceText = document.getElementById('sourceText').value;
    const writingText = document.getElementById('writingText').value;
    const ok = await saveDocument(sourceText, writingText);
    if (ok) { sourceDirty = false; setDot('source', 'saved'); }
  }, 5000);
});

// ═══════════ AUTO-SAVE: WRITING (30s) ═══════════
document.getElementById('writingText').addEventListener('input', function() {
  writingDirty = true;
  updateWordCount();
  setDot('writing', 'saving');
  clearTimeout(writingTimer);
  writingTimer = setTimeout(async () => {
    const sourceText = document.getElementById('sourceText').value;
    const writingText = document.getElementById('writingText').value;
    const ok = await saveDocument(sourceText, writingText);
    if (ok) { writingDirty = false; setDot('writing', 'saved'); }
  }, 30000);
});

// ═══════════ MANUAL SAVE ═══════════
async function saveNow() {
  clearTimeout(sourceTimer);
  clearTimeout(writingTimer);
  const sourceText = document.getElementById('sourceText').value;
  const writingText = document.getElementById('writingText').value;
  const ok = await saveDocument(sourceText, writingText);
  if (ok) {
    sourceDirty = false; writingDirty = false;
    setDot('source', 'saved'); setDot('writing', 'saved');
  }
}
window.saveNow = saveNow;

// ═══════════ UTILITIES ═══════════
function updateWordCount() {
  const text = document.getElementById('writingText').value;
  const count = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = count + ' words';
}

function clearPane(pane) {
  const el = document.getElementById(pane === 'source' ? 'sourceText' : 'writingText');
  el.value = '';
  el.dispatchEvent(new Event('input'));
}
function copyPane(pane) {
  const el = document.getElementById(pane === 'source' ? 'sourceText' : 'writingText');
  navigator.clipboard.writeText(el.value);
}
window.clearPane = clearPane;
window.copyPane = copyPane;

// ═══════════ SAVE ON EXIT ═══════════
window.addEventListener('beforeunload', () => {
  if (sourceDirty || writingDirty) {
    const sourceText = document.getElementById('sourceText').value;
    const writingText = document.getElementById('writingText').value;
    saveDocument(sourceText, writingText);
  }
});

// ═══════════ INIT ═══════════
loadDocument();
</script>
</body>
</html>
